<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>YT Focus Mode</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 280px;
      background: #0f0f0f;
      color: #fff;
      font-family: 'Space Mono', monospace;
      padding: 0;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      background: #ff0000;
      padding: 14px 18px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-icon {
      width: 28px;
      height: 20px;
      background: #fff;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    /* YouTube play button triangle */
    .header-icon::after {
      content: '';
      border-left: 9px solid #ff0000;
      border-top: 6px solid transparent;
      border-bottom: 6px solid transparent;
      margin-left: 2px;
    }

    .header-text h1 {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: #fff;
    }

    .header-text p {
      font-size: 9px;
      color: rgba(255,255,255,0.75);
      margin-top: 1px;
      letter-spacing: 0.3px;
    }

    /* ── Toggle rows ── */
    .content {
      padding: 14px 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      background: #1a1a1a;
      border-radius: 10px;
      border: 1px solid #2a2a2a;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .toggle-row:hover {
      background: #222;
      border-color: #3a3a3a;
    }

    .toggle-row.active {
      border-color: #ff0000;
      background: #1f0c0c;
    }

    .toggle-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .toggle-label {
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.4px;
    }

    .toggle-desc {
      font-size: 9px;
      color: #666;
      letter-spacing: 0.2px;
      line-height: 1.4;
    }

    /* ── Toggle switch ── */
    .switch {
      position: relative;
      width: 40px;
      height: 22px;
      flex-shrink: 0;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      inset: 0;
      background: #333;
      border-radius: 22px;
      transition: background 0.2s;
      cursor: pointer;
    }

    .slider::before {
      content: '';
      position: absolute;
      height: 16px;
      width: 16px;
      left: 3px;
      bottom: 3px;
      background: #666;
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }

    input:checked + .slider {
      background: #ff0000;
    }

    input:checked + .slider::before {
      transform: translateX(18px);
      background: #fff;
    }

    /* ── Footer ── */
    .footer {
      padding: 10px 18px 14px;
      font-size: 8.5px;
      color: #333;
      text-align: center;
      letter-spacing: 0.3px;
      border-top: 1px solid #1a1a1a;
    }

    .status-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #22c55e;
      margin-right: 5px;
      vertical-align: middle;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-icon"></div>
    <div class="header-text">
      <h1>YT FOCUS MODE</h1>
      <p>STAY IN CONTROL OF WHAT YOU WATCH</p>
    </div>
  </div>

  <div class="content">

    <label class="toggle-row" id="row-shorts">
      <div class="toggle-info">
        <span class="toggle-label">HIDE SHORTS</span>
        <span class="toggle-desc">Removes Shorts shelf from<br>home &amp; sidebar</span>
      </div>
      <div class="switch">
        <input type="checkbox" id="toggle-shorts" />
        <span class="slider"></span>
      </div>
    </label>

    <label class="toggle-row" id="row-recs">
      <div class="toggle-info">
        <span class="toggle-label">HIDE RECOMMENDATIONS</span>
        <span class="toggle-desc">Clears the right panel<br>while watching a video</span>
      </div>
      <div class="switch">
        <input type="checkbox" id="toggle-recommendations" />
        <span class="slider"></span>
      </div>
    </label>

  </div>

  <div class="footer">
    <span class="status-dot"></span>ACTIVE ON YOUTUBE.COM
  </div>

  <script src="popup.js"></script>
</body>
</html>
